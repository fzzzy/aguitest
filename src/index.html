<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AG-UI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #8B5CF6 0%, #A78BFA 50%, #B8A9C9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        #layout {
            width: 100%;
            max-width: 900px;
        }
        chat-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
            min-height: 90vh;
        }
        chat-header {
            padding: 20px;
        }
        chat-messages {
            display: flex;
            flex: 1;
            padding: 1.5em;
        }
        chat-input-container {
            display: flex;
            flex-wrap: wrap;
            padding: 10px 20px;
        }
        .tools-row {
            display: flex;
            align-items: center;
            width: 100%;
        }
        tool-toggles {
            flex: 1;
        }
        attachments-container {
            width: 100%;
        }
        message-input {
            flex: 1;
        }
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div id="layout">
        <chat-container>
            <chat-header><ping-indicator id="pingIndicator"></ping-indicator>AG-UI Chat</chat-header>
            <chat-messages id="messages">
            </chat-messages>
            <chat-input-container>
                <div class="tools-row">
                    <tool-toggles id="toolToggles"></tool-toggles>
                    <mic-button id="micButton" title="Start speech recognition"></mic-button>
                    <attach-button id="attachButton" title="Attach file">+</attach-button>
                    <input type="file" id="fileInput" accept="text/*,image/*">
                </div>
                <attachments-container id="attachments-container"></attachments-container>
                <message-input id="messageInput"></message-input>
                <send-button id="sendButton">Send</send-button>
            </chat-input-container>
            <scroll-anchor id="scroll-anchor"></scroll-anchor>
        </chat-container>
    </div>
    <script type="module" src="/index.ts"></script>
</body>
</html>
